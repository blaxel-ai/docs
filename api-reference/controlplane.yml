  /jobs:
    get:
      description: Returns batch job definitions in the workspace. Each job can be
        triggered to run multiple parallel tasks with configurable concurrency and
        retry settings. Starting with API version 2026-04-28 the response is wrapped
        in `{data, meta}` and supports cursor pagination via the `cursor` and `limit`
        query parameters; older versions keep returning a bare array with all jobs.
      operationId: ListJobs
      parameters:
      - $ref: '#/components/parameters/PaginationCursor'
      - $ref: '#/components/parameters/PaginationLimit'
      - $ref: '#/components/parameters/PaginationSort'
      - $ref: '#/components/parameters/PaginationQuery'
      - $ref: '#/components/parameters/PaginationAnchor'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
          description: successful operation
      security:
      - OAuth2:
        - jobs:list
      - ApiKeyAuth: []
      summary: List batch jobs
      tags:
      - jobs
    post:
      description: Creates a new batch job definition for parallel AI task processing.
        Jobs can be triggered via API or scheduled, and support configurable parallelism,
        timeouts, and retry logic.
      operationId: CreateJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Job'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: successful operation
      security:
      - OAuth2:
        - jobs:create
      - ApiKeyAuth: []
      summary: Create batch job
      tags:
      - jobs
  /jobs/{jobId}:
    delete:
      description: Permanently deletes a batch job definition and cancels any running
        executions. Historical execution data will be retained for a limited time.
      operationId: DeleteJob
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: successful operation
      security:
      - OAuth2:
        - jobs:delete
      - ApiKeyAuth: []
      summary: Delete batch job
