                $ref: '#/components/schemas/FunctionList'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
