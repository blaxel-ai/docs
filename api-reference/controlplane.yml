  /customdomains/{domainName}:
    delete:
      operationId: DeleteCustomDomain
      parameters:
      - description: Name of the custom domain
        in: path
        name: domainName
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
