info:
  title: Blaxel Control Plane
  version: 0.0.1
openapi: 3.0.3
paths:
  /agents:
    get:
      description: Returns AI agents deployed in the workspace. Each agent includes
        its deployment status, runtime configuration, and global inference endpoint
        URL. Starting with API version 2026-04-28 the response is wrapped in `{data,
        meta}` and supports cursor pagination via the `cursor` and `limit` query parameters;
        older versions keep returning a bare array with all agents.
      operationId: ListAgents
      parameters:
      - $ref: '#/components/parameters/PaginationCursor'
      - $ref: '#/components/parameters/PaginationLimit'
      - $ref: '#/components/parameters/PaginationSort'
      - $ref: '#/components/parameters/PaginationQuery'
      - $ref: '#/components/parameters/PaginationAnchor'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to list agents
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - agents:list
      - ApiKeyAuth: []
      summary: List all agents
      tags:
      - agents
    post:
      description: Creates a new AI agent deployment from your code. The agent will
        be built and deployed as a serverless auto-scaling endpoint. Use the Blaxel
        CLI 'bl deploy' for a simpler deployment experience.
      operationId: CreateAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: successful operation
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request - Invalid agent configuration
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to create agents
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Conflict - Agent with this name already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - agents:create
      - ApiKeyAuth: []
      summary: Create agent
      tags:
      - agents
  /agents/{agentName}:
    delete:
      description: Permanently deletes an agent and all its deployment history. The
        agent's inference endpoint will immediately stop responding. This action cannot
        be undone.
      operationId: DeleteAgent
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to delete this agent
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Agent does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - agents:delete
      - ApiKeyAuth: []
      summary: Delete agent
      tags:
      - agents
    get:
      description: Returns detailed information about an agent including its current
        deployment status, configuration, events history, and inference endpoint URL.
      operationId: GetAgent
      parameters:
      - description: Show secret values (requires workspace admin role)
        in: query
        name: show_secrets
        required: false
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to view this agent
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Agent does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - agents:get
      - ApiKeyAuth: []
      summary: Get agent
      tags:
      - agents
    parameters:
    - description: Unique name identifier of the agent
      in: path
      name: agentName
      required: true
      schema:
        type: string
    put:
      description: Updates an agent's configuration and triggers a new deployment.
        Changes to runtime settings, environment variables, or scaling parameters
        will be applied on the next deployment.
      operationId: UpdateAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: successful operation
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request - Invalid agent configuration
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to update this agent
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Agent does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - agents:update
      - ApiKeyAuth: []
      summary: Update agent
      tags:
      - agents
  /agents/{agentName}/revisions:
    get:
      operationId: ListAgentRevisions
      parameters:
      - description: Name of the agent
        in: path
        name: agentName
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RevisionMetadata'
                type: array
          description: successful operation
      security:
      - OAuth2:
        - agents:list
      - ApiKeyAuth: []
      summary: List all agent revisions
      tags:
      - agents
  /applications:
    get:
      description: Returns applications deployed in the workspace. Each application
        includes its deployment status, runtime configuration, and endpoint URL. Starting
        with API version 2026-04-28 the response is wrapped in `{data, meta}` and
        supports cursor pagination via the `cursor` and `limit` query parameters;
        older versions keep returning a bare array with all applications.
      operationId: ListApplications
      parameters:
      - $ref: '#/components/parameters/PaginationCursor'
      - $ref: '#/components/parameters/PaginationLimit'
      - $ref: '#/components/parameters/PaginationSort'
      - $ref: '#/components/parameters/PaginationQuery'
      - $ref: '#/components/parameters/PaginationAnchor'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationList'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to list applications
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - applications:list
      - ApiKeyAuth: []
      summary: List all applications
      tags:
      - applications
    post:
      description: Creates a new application deployment. Applications are long-running
        workloads that default to public access and mk3 generation.
      operationId: CreateApplication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Application'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          description: successful operation
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request - Invalid application configuration
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to create applications
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Conflict - Application with this name already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - applications:create
      - ApiKeyAuth: []
      summary: Create application
      tags:
      - applications
  /applications/{applicationName}:
    delete:
      description: Permanently deletes an application and all its deployment history.
        The application endpoint will immediately stop responding. This action cannot
        be undone.
      operationId: DeleteApplication
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to delete this application
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Application does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - applications:delete
      - ApiKeyAuth: []
      summary: Delete application
      tags:
      - applications
    get:
      description: Returns detailed information about an application including its
        current deployment status, configuration, events history, and endpoint URL.
      operationId: GetApplication
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to view this application
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Application does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - applications:get
      - ApiKeyAuth: []
      summary: Get application
      tags:
      - applications
    parameters:
    - description: Unique name identifier of the application
      in: path
      name: applicationName
      required: true
      schema:
        type: string
    put:
      description: Updates an application's configuration and triggers a new deployment.
        Changes to runtime settings, environment variables, or scaling parameters
        will be applied on the next deployment.
      operationId: UpdateApplication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Application'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          description: successful operation
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request - Invalid application configuration
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to update this application
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Application does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - applications:update
      - ApiKeyAuth: []
      summary: Update application
      tags:
      - applications
  /applications/{applicationName}/customdomains:
    post:
      description: Creates a new custom domain scoped to a specific application. After
        creation, you must configure DNS records and verify domain ownership before
        it becomes active.
      operationId: CreateApplicationCustomDomain
      parameters:
      - description: Name of the application
        in: path
        name: applicationName
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomDomain'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomDomain'
          description: successful operation
      security:
      - OAuth2:
        - customdomains:create
      - ApiKeyAuth: []
      summary: Create application custom domain
      tags:
      - customdomains
      x-stainless-ignore: true
  /applications/{applicationName}/revisions:
    get:
      operationId: ListApplicationRevisions
      parameters:
      - description: Name of the application
        in: path
        name: applicationName
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RevisionMetadata'
                type: array
          description: successful operation
      security:
      - OAuth2:
        - applications:list
      - ApiKeyAuth: []
      summary: List all application revisions
      tags:
      - applications
  /configuration:
    get:
      description: Returns global platform configuration including available regions,
        countries, continents, and private locations for deployment policies.
      operationId: GetConfiguration
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Configuration'
          description: Configuration of the control plane
      security:
      - OAuth2:
        - configurations:list
      - ApiKeyAuth: []
