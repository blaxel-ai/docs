  /images:
    delete:
      description: Cleans up unused container images in the workspace registry. Only
        removes images that are not currently referenced by any active agent, function,
        sandbox, or job deployment.
      operationId: CleanupImages
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  deleted:
                    description: Number of images deleted
                    type: integer
                  message:
                    description: Result message
                    type: string
                type: object
          description: successful operation
      security:
      - OAuth2:
        - images:delete
      - ApiKeyAuth: []
      summary: Cleanup unused container images
      tags:
      - images
    get:
      description: Returns all container images stored in the workspace registry,
        grouped by repository with their available tags. Images are created during
        deployments of agents, functions, sandboxes, and jobs.
      operationId: ListImages
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Image'
                type: array
          description: successful operation
      security:
      - OAuth2:
        - images:list
      - ApiKeyAuth: []
      summary: List container images
      tags:
      - images
    post:
      description: Builds a container image without creating a deployment. Returns
        a presigned URL for uploading source code. After upload, the image will be
        built and stored in the registry, but no agent, function, sandbox, or job
        will be created or updated.
      operationId: CreateImage
      requestBody:
        content:
          application/json:
            schema:
              properties:
                generation:
                  description: Runtime generation (e.g., mk3). Defaults to mk3 if
                    not specified.
                  type: string
                image:
                  description: A pre-built Docker image reference (e.g., docker.io/myorg/myimage:latest).
                    When provided, the build step is skipped and the image is used
                    directly as the source for the resource runtime.
                  type: string
                name:
                  description: Name of the image to build
                  type: string
                resourceType:
                  description: Resource type (agent, function, sandbox, job)
                  type: string
              required:
              - resourceType
              - name
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  image:
                    description: The registered image reference (only present when
                      image was provided in request)
                    type: string
                  message:
                    description: Status message
                    type: string
                  name:
                    description: Name of the image
                    type: string
                  resourceType:
                    description: Resource type
                    type: string
                type: object
          description: successful operation
          headers:
            X-Blaxel-Upload-Url:
              description: Presigned URL for uploading source code
              schema:
                type: string
        "400":
          description: invalid request
      security:
      - OAuth2:
        - images:create
      - ApiKeyAuth: []
      summary: Build a container image
      tags:
      - images
  /images/{resourceType}/{imageName}:
    delete:
      description: Deletes a container image and all its tags from the workspace registry.
        Will fail if the image is currently in use by an active deployment.
      operationId: DeleteImage
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: successful operation
        "400":
          description: image used
        "404":
          description: image not found
      security:
      - OAuth2:
        - images:delete
      - ApiKeyAuth: []
      summary: Delete container image
      tags:
      - images
    get:
      description: Returns detailed information about a container image including
        all available tags, creation dates, and size information.
      operationId: GetImage
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: successful operation
      security:
      - OAuth2:
        - images:get
      - ApiKeyAuth: []
      summary: Get container image
      tags:
      - images
    parameters:
    - description: Resource type (agents, functions, sandboxes, jobs)
      in: path
      name: resourceType
      required: true
      schema:
        type: string
    - description: Name of the container image repository
      in: path
      name: imageName
      required: true
      schema:
        type: string
  /images/{resourceType}/{imageName}/share:
    get:
      description: Returns the list of workspaces that a container image is currently
        shared with.
      operationId: ListImageShares
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ImageShareTarget'
                type: array
          description: successful operation
        "404":
          description: image not found
      security:
      - OAuth2:
        - images:get
      - ApiKeyAuth: []
      summary: List image shares
      tags:
      - images
    parameters:
    - description: Resource type (agents, functions, sandboxes, jobs)
      in: path
      name: resourceType
      required: true
      schema:
        type: string
    - description: Name of the container image repository
      in: path
      name: imageName
      required: true
      schema:
        type: string
    post:
      description: Shares a container image with another workspace by copying the
        metadata record. The underlying storage (S3) data is not duplicated. For same-account
        targets the share is applied immediately. For cross-account targets, a pending
        image share is created and must be explicitly accepted by an admin of the
        target workspace; the correct target account ID must be supplied as an anti-spam
        measure.
      operationId: ShareImage
      requestBody:
        content:
          application/json:
            schema:
              properties:
                targetAccountId:
                  description: Account ID of the target workspace. Required when the
                    target workspace belongs to a different account than the source
                    workspace (anti-spam).
                  type: string
                targetWorkspace:
                  description: Name of the workspace to share the image with
                  type: string
              required:
              - targetWorkspace
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: successful operation (same-account share, applied immediately)
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingImageShare'
          description: pending approval from target workspace admin
        "400":
          description: invalid request
        "404":
          description: image not found
        "409":
          description: image conflict in target workspace
      security:
      - OAuth2:
        - images:share
      - ApiKeyAuth: []
      summary: Share a container image
      tags:
      - images
  /images/{resourceType}/{imageName}/share/{targetWorkspace}:
    delete:
      description: Revokes sharing of a container image with a target workspace. Removes
