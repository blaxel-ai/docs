      - OAuth2:
        - jobs:update
      - ApiKeyAuth: []
      summary: Update batch job
      tags:
      - jobs
  /jobs/{jobId}/executions:
    get:
      description: Returns executions for a batch job. Starting with API version 2026-04-28
        the response is wrapped in `{data, meta}` and supports cursor pagination via
        the `cursor` and `limit` query parameters; older versions keep the legacy
        offset/limit contract and return a bare array.
      operationId: ListJobExecutions
      parameters:
      - description: Name of the job
        in: path
        name: jobId
        required: true
        schema:
          type: string
      - description: Number of items per page
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      - description: Page offset (legacy, ignored when Blaxel-Version >= 2026-04-28)
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
      - $ref: '#/components/parameters/PaginationCursor'
      - $ref: '#/components/parameters/PaginationSort'
      - $ref: '#/components/parameters/PaginationQuery'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionList'
          description: successful operation
        "400":
          description: bad request
        "500":
          description: internal server error
      security:
      - OAuth2:
        - jobs:list
      - ApiKeyAuth: []
      summary: List job executions
      tags:
      - jobs
    post:
      description: Triggers a new execution of the batch job. Each execution runs
        multiple tasks in parallel according to the job's configured concurrency.
        Tasks can be parameterized via the request body.
      operationId: CreateJobExecution
      parameters:
      - description: Name of the job
        in: path
        name: jobId
        required: true
        schema:
          type: string
        x-stainless-param: pathJobId
      requestBody:
        content:
