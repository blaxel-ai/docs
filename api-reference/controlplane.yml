  /workspaces:
    get:
      description: Returns all workspaces the authenticated user has access to. Each
        workspace is a separate tenant with its own resources, team members, and billing.
      operationId: ListWorkspaces
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Workspace'
                type: array
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - workspaces:list
      - ApiKeyAuth: []
      summary: List accessible workspaces
      tags:
      - workspaces
    post:
      description: Creates a new workspace tenant. The authenticated user becomes
        the workspace admin. Requires a linked billing account.
      operationId: CreateWorkspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workspace'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: successful operation
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request - Invalid workspace configuration
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions or no billing account
            linked
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Conflict - Workspace with this name already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - workspaces:create
      - ApiKeyAuth: []
      summary: Create workspace tenant
      tags:
      - workspaces
      x-stainless-ignore: true
  /workspaces/{workspaceName}:
    delete:
      description: Permanently deletes a workspace and ALL its resources (agents,
        functions, sandboxes, volumes, etc.). This action cannot be undone. Only workspace
        admins can delete a workspace.
      operationId: DeleteWorkspace
      parameters:
      - description: Name of the workspace
        in: path
        name: workspaceName
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Only workspace admins can delete workspaces
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Workspace does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - workspaces:delete
      - ApiKeyAuth: []
      summary: Delete workspace tenant
      tags:
      - workspaces
      x-stainless-ignore: true
    get:
      description: Returns detailed information about a workspace including its display
        name, account ID, status, and runtime configuration.
      operationId: GetWorkspace
      parameters:
      - description: Name of the workspace
        in: path
        name: workspaceName
        required: true
        schema:
          type: string
      - description: When true, the response includes a resourceCounts map with the
          number of agents, functions, models, sandboxes, policies, jobs, volumes,
          volumetemplates, integrationconnections, previews, customdomains, serviceaccounts
          and images currently in this workspace. Off by default — each count is one
          extra indexed query.
        in: query
        name: countResources
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: successful operation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - You do not have access to this workspace
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Workspace does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - workspaces:get
      - ApiKeyAuth: []
      summary: Get workspace details
      tags:
      - workspaces
    put:
      description: Updates a workspace's settings such as display name and labels.
        The workspace name cannot be changed after creation.
      operationId: UpdateWorkspace
      parameters:
      - description: name of the workspace
        in: path
        name: workspaceName
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workspace'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: successful operation
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad request - Invalid workspace configuration
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid or missing authentication credentials
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions to update this workspace
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found - Workspace does not exist
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - OAuth2:
        - workspaces:update
      - ApiKeyAuth: []
      summary: Update workspace
      tags:
      - workspaces
      x-stainless-ignore: true
  /workspaces/{workspaceName}/leave:
    delete:
      description: Leaves a workspace.
      operationId: LeaveWorkspace
      parameters:
      - description: Name of the workspace
        in: path
        name: workspaceName
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: Workspace successfully left
        "404":
          description: Workspace not found
      security:
      - OAuth2:
        - workspaces:leave
      - ApiKeyAuth: []
      summary: Leave workspace
      tags:
      - workspaces
      x-stainless-ignore: true
  /workspaces/availability:
    post:
      description: Check if a workspace is available.
      operationId: CheckWorkspaceAvailability
      parameters:
      - description: When true, return a structured WorkspaceAvailability object with
          a machine-readable reason and human-readable message instead of a bare boolean.
          Defaults to false for backwards compatibility.
        in: query
        name: withReason
        required: false
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
              required:
              - name
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                - type: boolean
                - $ref: '#/components/schemas/WorkspaceAvailability'
          description: successful operation
      summary: Check workspace availability
      tags:
      - workspaces
      x-stainless-ignore: true
security:
- OAuth2:
  - admin
